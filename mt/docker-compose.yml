services:
  db:
    image: mariadb:10.11
    container_name: mt-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${MT_HTTP_PORT:-8082}:80"
    volumes:
      # Source code mount — sửa code local, reflect ngay trong container
      # ./ = thư mục hiện tại chứa MT source (mt.cgi, lib, mt-static, v.v.)
      - .:/var/www/cgi-bin/mt
      # Published site output (local folder)
      - ./published:/var/www/html/site
      - ./assets:/var/www/cgi-bin/mt/mt-static/assets
    environment:
      MT_DB_HOST: db
      MT_DB_PORT: 3306
      MT_DB_NAME: ${MYSQL_DATABASE}
      MT_DB_USER: ${MYSQL_USER}
      MT_DB_PASS: ${MYSQL_PASSWORD}

volumes:
  db_data:
    driver: local
